<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriPoint CRM — Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1e293b; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card {
            background: #fff; border-radius: 16px; padding: 2.5rem;
            width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }
        .login-card h1 { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
        .login-card .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .btn-primary { background: #1a56db; border: none; padding: 0.6rem; border-radius: 8px; }
        .btn-primary:hover { background: #1e40af; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>TriPoint RE</h1>
        <p class="subtitle">Sign in to your CRM</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
    </div>
</body>
</html>
